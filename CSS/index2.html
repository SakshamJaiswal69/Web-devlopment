<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Margin</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
    #box1{
        display:inline-block;
        margin:18px ;
        width: 321px;
        height: 560px;
        background-color: chartreuse;
    }
    #box2{
        display: inline-block;
        /* display: none; */
        /* visibility: hidden; */
        width: 321px;
        height: 560px;
        background-color: cornflowerblue;
    }
    p{
        background-color: yellow;
        color: red;
        margin: auto;
        text-decoration: underline dashed black;
        text-transform: capitalize;
        /* line-height: 40px; */
        font-size: 10px;
    }
    </style>
</head>
<body>
    <Header>
        
    </Header>
    <p>this is a boy</p>
    <main>
        <div id="box1">Lorem ipsum dolor sit </div>

        <div id="box2">Lorem ipsum dolor sit</div>
    </main>
</body>
</html>
