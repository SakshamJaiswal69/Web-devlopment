<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
    <style>
        *{
    margin: 0;
    padding:0;

}
.box1{
    height:256px;
    width:300px;
    background-color:orange;
    float:right;
}
.box2{
    height:256px;
    width:300px;
    background-color:red;
    float:right;
    clear:right;
}
    </style>
</head>
<body>
    <div class="box1">box 1</div>
    <div class="box2">box 2</div>
</body>
</html>
